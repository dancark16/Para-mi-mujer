<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Para Mi Chica Diamante ❤️</title>
  <style>
    :root {
      --accent: #ff6f91;
      --accent-dark: #ff3f6c;
      --heart: #ff2d55;
      --bg1: #ff9a9e;
      --bg2: #fad0c4;
      --bg3: #fbc2eb;
      --bg4: #a6c1ee;
      --leaf1: #7ed957;
      --leaf2: #9fe67a;
      --leaf3: #6fd84f;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #fff;
    }

    body {
      background: linear-gradient(270deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4));
      background-size: 800% 800%;
      animation: fondoAnimado 20s ease infinite;
      overflow: hidden;
      color: #fff;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      cursor: none;
    }

    @keyframes fondoAnimado {
      0% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }

      100% {
        background-position: 0% 50%
      }
    }

    /* ---------------- TOP AREA (base UI + base animations) ---------------- */
    .topArea {
      width: 100%;
      max-width: 920px;
      margin: 28px auto 0;
      padding: 20px;
      text-align: center;
      position: relative;
      z-index: 120;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      display: none;
    }

    .title {
      margin: 0;
      font-size: clamp(1.6rem, 3.2vw, 2.6rem);
      letter-spacing: .6px;
      text-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
      animation: slideDown 700ms ease both;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-18px);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap
    }

    button {
      padding: 12px 26px;
      border-radius: 28px;
      border: 0;
      background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      transition: transform .18s, opacity .18s;
    }

    button:active {
      transform: translateY(2px) scale(.995)
    }

    button[disabled] {
      opacity: .6;
      cursor: default;
      filter: grayscale(.05)
    }

    button.pulse {
      animation: pulseBtn 2200ms ease-in-out infinite
    }

    @keyframes pulseBtn {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.02)
      }

      100% {
        transform: scale(1)
      }
    }

    #mensaje {
      margin: 18px auto;
      min-height: 84px;
      max-width: 92%;
      opacity: 0;
      transition: opacity .4s;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
      padding: 14px 18px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      color: #fff;
      line-height: 1.4;
      position: relative;
      z-index: 121;
    }

    /* ---------------- BOTTOM AREA (decorative animations isolated) ---------------- */
    .scene {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 36vh;
      z-index: 30;
      pointer-events: none;
      overflow: visible;
      display: block;
    }

    .hill {
      position: absolute;
      bottom: 0;
      width: 140%;
      height: 60%;
      left: -20%;
      background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.06), transparent 20%),
        linear-gradient(180deg, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.02));
      border-radius: 50% 50% 0 0;
      transform-origin: center bottom;
      animation: sway 8s ease-in-out infinite;
      opacity: .18;
      filter: blur(6px);
    }

    @keyframes sway {
      0% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }

      100% {
        transform: translateY(0)
      }
    }

    /* Improved trees: grow, sway, leaf rustle, interactive hover/click */
    .tree {
      position: absolute;
      bottom: 6vh;
      width: 92px;
      height: 150px;
      transform-origin: center bottom;
      z-index: 32;
      opacity: 0;
      will-change: transform, opacity;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .tree .trunk {
      width: 20px;
      height: 60px;
      background: #8b5a2b;
      border-radius: 6px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.12);
      position: relative;
      z-index: 2;
    }

    .tree .canopy {
      position: absolute;
      bottom: 48px;
      width: 150px;
      height: 120px;
      border-radius: 60% 60% 50% 50%;
      background: radial-gradient(circle at 30% 30%, var(--leaf2), var(--leaf1) 60%);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      transform-origin: center bottom;
      z-index: 1;
      overflow: visible;
    }

    /* leaf rustle: subtle scale/rotate loop */
    .tree .canopy.rustle {
      animation: leafRustle 3.6s ease-in-out infinite;
    }

    @keyframes leafRustle {
      0% {
        transform: translateY(0) rotate(-1deg) scale(1);
      }

      25% {
        transform: translateY(-2px) rotate(1deg) scale(1.01);
      }

      50% {
        transform: translateY(0) rotate(-0.6deg) scale(1);
      }

      75% {
        transform: translateY(-1px) rotate(0.8deg) scale(1.01);
      }

      100% {
        transform: translateY(0) rotate(-1deg) scale(1);
      }
    }

    /* grow animation on entrance */
    .tree.grow {
      animation: treeGrow 900ms cubic-bezier(.2, .9, .3, 1) forwards;
    }

    @keyframes treeGrow {
      0% {
        transform: scaleY(0.02) translateY(40px);
        opacity: 0;
      }

      60% {
        transform: scaleY(1.06) translateY(-6px);
        opacity: 1;
      }

      100% {
        transform: scaleY(1) translateY(0);
        opacity: 1;
      }
    }

    /* gentle sway after grown */
    .tree.sway {
      animation: treeSway 6s ease-in-out infinite;
    }

    @keyframes treeSway {
      0% {
        transform: translateY(0) rotate(-1deg);
      }

      50% {
        transform: translateY(-2px) rotate(1.2deg);
      }

      100% {
        transform: translateY(0) rotate(-1deg);
      }
    }

    /* hover interaction: canopy bounces and leaves scatter */
    .tree.hovered .canopy {
      animation: canopyBounce 420ms cubic-bezier(.2, .9, .3, 1);
    }

    @keyframes canopyBounce {
      0% {
        transform: translateY(0) scale(1);
      }

      40% {
        transform: translateY(-10px) scale(1.03);
      }

      100% {
        transform: translateY(0) scale(1);
      }
    }

    /* blossom particle */
    .petal {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd1dc 0%, #ff6f91 60%);
      pointer-events: none;
      z-index: 9996;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.12));
      animation: petalFall 2200ms linear forwards;
      will-change: transform, opacity;
    }

    @keyframes petalFall {
      0% {
        transform: translateY(0) rotate(0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(420px) rotate(720deg) scale(.6);
        opacity: 0;
      }
    }

    /* butterflies */
    .butterfly {
      position: fixed;
      width: 28px;
      height: 20px;
      pointer-events: none;
      z-index: 9997;
      opacity: 0;
      will-change: transform, opacity;
    }

    .butterfly .wing {
      display: inline-block;
      width: 14px;
      height: 20px;
      border-radius: 50% 50% 20% 20%;
      background: linear-gradient(180deg, #ffd1dc, #ff6f91)
    }

    .butterfly .wing.right {
      transform: scaleX(-1);
      margin-left: 2px
    }

    .butterfly.fly {
      animation: butterflyFlight 4200ms cubic-bezier(.2, .9, .3, 1) forwards;
      opacity: 1
    }

    @keyframes butterflyFlight {
      0% {
        transform: translateY(0) translateX(0) rotate(-10deg) scale(.8);
        opacity: 0
      }

      10% {
        opacity: 1
      }

      50% {
        transform: translateY(-80px) translateX(60px) rotate(10deg) scale(1.05)
      }

      100% {
        transform: translateY(-220px) translateX(160px) rotate(30deg) scale(.9);
        opacity: 0
      }
    }

    /* fireflies */
    .firefly {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #ffd166 40%, rgba(255, 209, 102, 0) 70%);
      filter: blur(.6px);
      opacity: 0;
      z-index: 9995;
      will-change: transform, opacity;
      animation: fireflyFloat 3200ms ease-in-out infinite;
    }

    @keyframes fireflyFloat {
      0% {
        transform: translateY(0) translateX(0) scale(.8);
        opacity: 0
      }

      10% {
        opacity: 1
      }

      50% {
        transform: translateY(-30px) translateX(20px) scale(1.1);
        opacity: 1
      }

      100% {
        transform: translateY(0) translateX(0) scale(.9);
        opacity: 0
      }
    }

    /* rising hearts */
    .rising-heart {
      position: fixed;
      width: 36px;
      height: 36px;
      pointer-events: none;
      z-index: 9995;
      will-change: transform, opacity;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.12));
      animation: riseUp 2200ms cubic-bezier(.2, .9, .3, 1) forwards
    }

    @keyframes riseUp {
      0% {
        opacity: 0;
        transform: translateY(0) scale(.6) rotate(-20deg)
      }

      10% {
        opacity: 1;
        transform: translateY(-20px) scale(1) rotate(-10deg)
      }

      60% {
        opacity: 1;
        transform: translateY(-220px) scale(1.05) rotate(6deg)
      }

      100% {
        opacity: 0;
        transform: translateY(-420px) scale(.8) rotate(18deg)
      }
    }

    /* confetti */
    .confetti {
      position: fixed;
      width: 8px;
      height: 12px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9994;
      opacity: 0;
      animation: confettiFall 1600ms linear forwards
    }

    @keyframes confettiFall {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0)
      }

      100% {
        opacity: 0;
        transform: translateY(420px) rotate(720deg)
      }
    }

    /* cursor heart + trail (restored) */
    .cursor-heart {
      position: fixed;
      width: 22px;
      height: 22px;
      background: var(--heart);
      transform: rotate(-45deg);
      pointer-events: none;
      z-index: 9999;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.18));
      will-change: left, top
    }

    .cursor-heart::before,
    .cursor-heart::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      background: var(--heart);
      border-radius: 50%
    }

    .cursor-heart::before {
      top: -11px;
      left: 0
    }

    .cursor-heart::after {
      left: 11px;
      top: 0
    }

    .trail {
      position: fixed;
      width: 14px;
      height: 14px;
      background: rgba(255, 45, 85, 0.85);
      transform: rotate(-45deg);
      pointer-events: none;
      border-radius: 50%;
      animation: fadeTrail 900ms forwards;
      z-index: 9998;
      filter: blur(.2px) drop-shadow(0 6px 10px rgba(0, 0, 0, 0.12));
      will-change: opacity, transform
    }

    @keyframes fadeTrail {
      from {
        opacity: 1;
        transform: scale(1) rotate(-45deg)
      }

      to {
        opacity: 0;
        transform: scale(.4) rotate(-45deg)
      }
    }

    /* small sparkle */
    .spark {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, rgba(255, 255, 255, 0.6)40%, rgba(255, 255, 255, 0)60%);
      pointer-events: none;
      z-index: 9999;
      transform: scale(0);
      animation: popSpark 700ms ease forwards
    }

    @keyframes popSpark {
      0% {
        transform: scale(0);
        opacity: 1
      }

      60% {
        transform: scale(1.6);
        opacity: 1
      }

      100% {
        transform: scale(.6);
        opacity: 0
      }
    }

    @media (max-width:600px) {
      .tree {
        width: 64px;
        height: 120px
      }

      .tree .canopy {
        width: 120px;
        height: 96px;
        bottom: 44px
      }

      .rising-heart {
        width: 28px;
        height: 28px
      }

      .confetti {
        width: 6px;
        height: 9px
      }

      .cursor-heart {
        width: 18px;
        height: 18px
      }

      .cursor-heart::before,
      .cursor-heart::after {
        width: 18px;
        height: 18px;
        top: -9px
      }

      .butterfly {
        width: 22px;
        height: 16px
      }
    }
  </style>
</head>

<body>
  <!-- TOP AREA: base UI and base animations (isolated) -->
  <div class="topArea" id="topArea" aria-live="polite">
    <h1 class="title">💖 Para Mi Nahomy 💖</h1>

    <div class="controls">
      <button id="btnAccion" class="pulse" aria-controls="mensaje">Haz clic aquí</button>
    </div>

    <div id="mensaje" aria-live="polite"></div>
  </div>

  <!-- BOTTOM AREA: decorative animations (isolated) -->
  <div class="scene" id="scene" aria-hidden="true">
    <div class="hill" style="left:-10%;"></div>

    <div class="tree" id="tree1" style="left:8%;">
      <div class="canopy"></div>
      <div class="trunk"></div>
    </div>

    <div class="tree" id="tree2" style="left:30%;">
      <div class="canopy" style="background: radial-gradient(circle at 30% 30%, var(--leaf3), var(--leaf1) 60%);"></div>
      <div class="trunk"></div>
    </div>

    <div class="tree" id="tree3" style="left:52%;">
      <div class="canopy" style="background: radial-gradient(circle at 30% 30%, var(--leaf2), var(--leaf3) 60%);"></div>
      <div class="trunk"></div>
    </div>

    <div class="tree" id="tree4" style="left:74%;">
      <div class="canopy" style="background: radial-gradient(circle at 30% 30%, var(--leaf1), var(--leaf2) 60%);"></div>
      <div class="trunk"></div>
    </div>

    <div class="star" style="left:10%;top:6%;animation-delay:0s;"></div>
    <div class="star" style="left:22%;top:4%;animation-delay:.6s;"></div>
    <div class="star" style="left:40%;top:8%;animation-delay:1.2s;"></div>
    <div class="star" style="left:68%;top:5%;animation-delay:.4s;"></div>
    <div class="star" style="left:86%;top:7%;animation-delay:.9s;"></div>

    <svg class="bird" viewBox="0 0 64 36" style="animation-delay:0s;left:-10%;position:absolute;top:6vh;">
      <path d="M2 20c10-8 18-8 28 0 10-8 18-8 28 0" stroke="#fff" stroke-width="3" stroke-linecap="round"
        stroke-linejoin="round" opacity=".95" fill="none" />
    </svg>
  </div>

  <!-- cursor layer -->
  <div id="cursorLayer" aria-hidden="true"></div>

  <script>
    // --- clave y arranque ---
    const clave = prompt("Ingresa la clave para acceder:");

    if (clave !== "2403") {
      alert("Clave incorrecta 💔");
      document.body.innerHTML = `
    <div style="display:flex;justify-content:center;align-items:center;height:100vh;color:white;font-family:sans-serif;text-align:center;">
      <div>
        <h1>Acceso denegado 💔</h1>
        <p>La clave es incorrecta</p>
      </div>
    </div>
  `;
    } else {
      document.getElementById('topArea').style.display = 'block';
      animateTreesEntrance();
      initBase();
      setTimeout(initDecorative, 1100);
    }

    // --- base UI logic (top area) ---
    const frases = [
      "Quiero que seas la madre de mis hijos, mi mujer.",
      "Yo hago lo que sea por ti, te quiero conmigo hasta el fin.",
      "Eres mi chica diamante, tan perfecta y hermosa como esa joya.",
      "Tus ojos son las auroras más preciosas que pude haber apreciado",
      "Tu sonrisa es el sol que ilumina mis días más oscuros.",
      "Todos los dias me tienes pensado cuando vas a venir, que ya no soporto más la distancia.",
      "Como un sueño no sé si aún eres real que hasta parece de ciencia ficción, mi reina.",
      "Debajo de la luna quiero apreciarte y centarte, me tienes inventando melodias a cada instante",
      "Me hiciste brujería no puedo dejar de pensarte, ni un segundo del día, ni en ninguna parte",
      "Te necesito aquí y ahora pero te voy a esperar lo que sea para al fin tenerte como mía"
    ];
    let indice = 0;

    function initBase() {
      const btn = document.getElementById('btnAccion');
      const mensaje = document.getElementById('mensaje');
      btn.classList.add('pulse');

      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        btn.disabled = true;
        btn.classList.remove('pulse');
        mensaje.style.opacity = 1;
        typeWriter(frases[indice], mensaje, 0, () => {
          crearLocalSpark(mensaje);
          setTimeout(() => { btn.disabled = false; btn.classList.add('pulse'); }, 650);
        });
        indice = (indice + 1) % frases.length;
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !btn.disabled) btn.click();
      });
    }

    function typeWriter(text, el, i = 0, cb) {
      if (i === 0) el.textContent = '';
      if (i < text.length) {
        el.textContent += text.charAt(i);
        const delay = 20 + Math.floor(Math.random() * 40);
        setTimeout(() => typeWriter(text, el, i + 1, cb), delay);
      } else if (typeof cb === 'function') cb();
    }

    function crearLocalSpark(el) {
      const r = el.getBoundingClientRect();
      const s = document.createElement('div');
      s.className = 'spark';
      s.style.left = (r.left + r.width / 2 + (Math.random() * 40 - 20)) + 'px';
      s.style.top = (r.top + r.height / 2 + (Math.random() * 40 - 20)) + 'px';
      document.body.appendChild(s);
      setTimeout(() => { if (s.parentNode) s.parentNode.removeChild(s); }, 900);
    }

    // --- TREES ENTRANCE & INTERACTION ---
    function animateTreesEntrance() {
      const ids = ['tree1', 'tree2', 'tree3', 'tree4'];
      ids.forEach((id, idx) => {
        const el = document.getElementById(id);
        if (!el) return;
        setTimeout(() => {
          el.classList.add('grow');
          // after grow, enable rustle and sway
          setTimeout(() => {
            el.querySelector('.canopy').classList.add('rustle');
            el.classList.add('sway');
            // add hover/click handlers for interactivity
            addTreeInteractivity(el);
          }, 900);
        }, idx * 180);
      });
    }

    function addTreeInteractivity(treeEl) {
      // hover: canopy bounce + small petals
      treeEl.addEventListener('mouseenter', () => {
        treeEl.classList.add('hovered');
        // spawn a few tiny petals that fall gently
        spawnPetalsNear(treeEl, 6);
      });
      treeEl.addEventListener('mouseleave', () => {
        treeEl.classList.remove('hovered');
      });

      // click: big blossom burst + butterfly
      treeEl.addEventListener('click', (e) => {
        // ensure clicks on topArea don't trigger (pointer-events none on scene, but just in case)
        const topRect = document.getElementById('topArea').getBoundingClientRect();
        if (e.clientY < topRect.bottom + 6) return;
        const rect = treeEl.getBoundingClientRect();
        spawnPetalsBurst(rect.left + rect.width / 2, rect.top + rect.height / 2, 18);
        spawnButterflyFrom(rect.left + rect.width / 2, rect.top + rect.height / 2);
      });
    }

    function spawnPetalsNear(treeEl, n) {
      const rect = treeEl.getBoundingClientRect();
      for (let i = 0; i < n; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = (rect.left + rect.width / 2 + (Math.random() * 80 - 40)) + 'px';
        p.style.top = (rect.top + rect.height / 2 + (Math.random() * 40 - 20)) + 'px';
        p.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(p);
        setTimeout(() => { if (p.parentNode) p.parentNode.removeChild(p); }, 2400);
      }
    }

    function spawnPetalsBurst(x, y, count) {
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = (x + (Math.random() * 160 - 80)) + 'px';
        p.style.top = (y + (Math.random() * 80 - 40)) + 'px';
        p.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(p);
        setTimeout(() => { if (p.parentNode) p.parentNode.removeChild(p); }, 2400);
      }
    }

    function spawnButterflyFrom(x, y) {
      const b = document.createElement('div');
      b.className = 'butterfly';
      b.style.left = (x) + 'px';
      b.style.top = (y) + 'px';
      b.innerHTML = `<span class="wing left"></span><span class="wing right"></span>`;
      document.body.appendChild(b);
      setTimeout(() => b.classList.add('fly'), 60);
      setTimeout(() => { if (b.parentNode) b.parentNode.removeChild(b); }, 4400);
    }

    function spawnFirefliesNear(treeEl, n) {
      const rect = treeEl.getBoundingClientRect();
      for (let i = 0; i < n; i++) {
        const f = document.createElement('div');
        f.className = 'firefly';
        const fx = rect.left + rect.width / 2 + (Math.random() * 80 - 40);
        const fy = rect.top + rect.height / 2 + (Math.random() * 40 - 20);
        f.style.left = fx + 'px';
        f.style.top = fy + 'px';
        f.style.animationDelay = (Math.random() * 1200) + 'ms';
        document.body.appendChild(f);
        setTimeout(() => { if (f.parentNode) f.parentNode.removeChild(f); }, 12000 + Math.random() * 6000);
      }
    }

    // --- decorative animations (isolated) ---
    let decorativeInterval = null;
    function initDecorative() {
      // gentle periodic rising hearts near center
      decorativeInterval = setInterval(() => spawnRisingHeartsBurst(window.innerWidth * 0.5, window.innerHeight - 120, 3), 2600);

      // occasional butterflies from random trees
      setInterval(() => {
        const trees = ['tree1', 'tree2', 'tree3', 'tree4'];
        const id = trees[Math.floor(Math.random() * trees.length)];
        const el = document.getElementById(id);
        if (el) spawnButterflyNear(el);
      }, 4200);

      // spawn subtle fireflies near each tree
      ['tree1', 'tree2', 'tree3', 'tree4'].forEach(id => {
        const el = document.getElementById(id);
        if (el) spawnFirefliesNear(el, 2);
      });

      // wire button click to decorative bursts
      const btn = document.getElementById('btnAccion');
      btn.addEventListener('click', (e) => {
        const rect = btn.getBoundingClientRect();
        spawnRisingHeartsBurst(rect.left + rect.width / 2, rect.top + rect.height / 2, 10);
        spawnConfettiBurst(rect.left + rect.width / 2, rect.top + rect.height / 2, 18);
      });

      // allow clicking scene (outside topArea) to spawn hearts/confetti
      window.addEventListener('click', (ev) => {
        const topRect = document.getElementById('topArea').getBoundingClientRect();
        if (ev.clientY > topRect.bottom + 6) {
          spawnRisingHeartsBurst(ev.clientX, ev.clientY, 6);
          spawnConfettiBurst(ev.clientX, ev.clientY, 10);
        }
      });

      // restore cursor trail
      initCursorHeart();
    }

    function spawnButterflyNear(treeEl) {
      const rect = treeEl.getBoundingClientRect();
      spawnButterflyFrom(rect.left + rect.width / 2 + (Math.random() * 40 - 20), rect.top + rect.height / 2 + (Math.random() * 20 - 10));
    }

    function spawnRisingHeartsBurst(x, y, count) {
      for (let i = 0; i < count; i++) {
        createRisingHeart(x + (Math.random() * 80 - 40), y + (Math.random() * 40 - 20), 0.9 + Math.random() * 0.6);
      }
    }

    function createRisingHeart(x, y, scale) {
      const h = document.createElement('div');
      h.className = 'rising-heart';
      h.style.left = (x - 18) + 'px';
      h.style.top = (y - 18) + 'px';
      h.style.transform = `rotate(${(Math.random() * 40 - 20)}deg) scale(${scale})`;
      h.innerHTML = `<svg viewBox="0 0 24 24" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 21s-7-4.35-9.2-6.6C-0.2 10.9 3.2 6 7.5 7.5 9 8.1 10 9.6 12 11c2-1.4 3-2.9 4.5-3.5 4.3-1.5 7.7 3.4 4.7 7.9C19 16.65 12 21 12 21z" fill="${getComputedStyle(document.documentElement).getPropertyValue('--heart') || '#ff2d55'}"/>
      </svg>`;
      document.body.appendChild(h);
      setTimeout(() => { if (h.parentNode) h.parentNode.removeChild(h); }, 2400);
    }

    function spawnConfettiBurst(x, y, count) {
      const colors = ['#ffd166', '#06d6a0', '#118ab2', '#ef476f', '#ffd1dc'];
      for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = (x + (Math.random() * 160 - 80)) + 'px';
        c.style.top = (y + (Math.random() * 40 - 20)) + 'px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(c);
        setTimeout(() => { if (c.parentNode) c.parentNode.removeChild(c); }, 1700);
      }
    }

    // cursor heart + trail restored; trails suppressed when pointer over topArea
    function initCursorHeart() {
      const cursor = document.createElement('div');
      cursor.className = 'cursor-heart';
      document.getElementById('cursorLayer').appendChild(cursor);

      let lastTrail = 0;
      function addTrail(x, y) {
        const topRect = document.getElementById('topArea').getBoundingClientRect();
        const margin = 8;
        if (x > topRect.left - margin && x < topRect.right + margin &&
          y > topRect.top - margin && y < topRect.bottom + margin) {
          return;
        }
        const t = document.createElement('div');
        t.className = 'trail';
        t.style.left = (x + (Math.random() * 12 - 6)) + 'px';
        t.style.top = (y + (Math.random() * 12 - 6)) + 'px';
        t.style.opacity = (0.6 + Math.random() * 0.4);
        const size = 8 + Math.random() * 12;
        t.style.width = size + 'px';
        t.style.height = size + 'px';
        document.body.appendChild(t);
        setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 1000);
      }

      function onMove(e) {
        const x = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
        const y = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
        cursor.style.left = (x - 11) + 'px';
        cursor.style.top = (y - 11) + 'px';
        const now = Date.now();
        if (now - lastTrail > 60) {
          addTrail(x - 7, y - 7);
          lastTrail = now;
        }
      }

      window.addEventListener('mousemove', onMove, { passive: true });
      window.addEventListener('touchmove', onMove, { passive: true });
    }

    // cleanup
    window.addEventListener('beforeunload', () => {
      if (decorativeInterval) clearInterval(decorativeInterval);
    });
  </script>
</body>
